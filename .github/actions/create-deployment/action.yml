name: Create GitHub Deployment
description: Creates a GitHub deployment and sets initial status
inputs:
  environment:
    required: true
  ref:
    required: true
  is-production:
    default: 'false'
  is-transient:
    default: 'false'
  description:
    default: ''
  payload:
    default: '{}'
  environment-url:
    default: ''
  initial-status:
    default: 'in_progress'
  status-description:
    default: ''

outputs:
  deployment-id:
    description: The ID of the created deployment
    value: ${{ steps.create.outputs.deployment-id }}

runs:
  using: composite
  steps:
    - name: Create deployment
      id: create
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        DEPLOY_REF: ${{ inputs.ref }}
        DEPLOY_ENV: ${{ inputs.environment }}
        DEPLOY_DESC: ${{ inputs.description }}
        DEPLOY_PROD: ${{ inputs.is-production }}
        DEPLOY_TRANSIENT: ${{ inputs.is-transient }}
        DEPLOY_PAYLOAD: ${{ inputs.payload }}
        DEPLOY_INITIAL_STATUS: ${{ inputs.initial-status }}
        DEPLOY_STATUS_DESC: ${{ inputs.status-description }}
        DEPLOY_ENV_URL: ${{ inputs.environment-url }}
      run: |
        BODY=$(jq -n \
          --arg ref "$DEPLOY_REF" \
          --arg env "$DEPLOY_ENV" \
          --arg desc "$DEPLOY_DESC" \
          --argjson prod "$DEPLOY_PROD" \
          --argjson transient "$DEPLOY_TRANSIENT" \
          --argjson payload "$DEPLOY_PAYLOAD" \
          '{
            ref: $ref,
            environment: $env,
            description: $desc,
            production_environment: $prod,
            transient_environment: $transient,
            payload: $payload,
            auto_merge: false,
            required_contexts: []
          }')

        DEPLOY_ID=$(echo "$BODY" | gh api repos/${{ github.repository }}/deployments --input - --jq '.id')

        if [[ -z "$DEPLOY_ID" ]]; then
          echo "::error::Failed to create deployment"
          exit 1
        fi

        echo "deployment-id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"

        gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" \
          -f state="${DEPLOY_INITIAL_STATUS}" \
          -f description="${DEPLOY_STATUS_DESC}" \
          -f environment_url="${DEPLOY_ENV_URL}"
