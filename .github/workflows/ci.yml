name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: |
          npm ci --prefer-offline
          pip install --no-cache-dir pre-commit -r apps/backend/requirements.txt

      - name: Build workspaces
        run: npm run build --workspaces --if-present

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always

      - name: Run core tests
        run: npm run test --workspace @lingua-quiz/core

  deep-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline
          pip install --no-cache-dir semgrep mypy bandit vulture pylint pyupgrade pip-audit sqlfluff types-requests types-PyYAML types-aiofiles -r apps/backend/requirements.txt

      - name: Build workspaces
        run: npm run build --workspaces --if-present

      - name: ESLint
        run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: TypeScript type checking
        run: npm run typecheck

      - name: mypy
        run: mypy --python-version=3.13 --check-untyped-defs --ignore-missing-imports --no-warn-unused-ignores apps/backend/src/
        continue-on-error: false

      - name: bandit
        run: bandit -q -r -x 'tests,*/test_*.py,*/conftest.py' --skip B101,B108,B110,B404,B603 apps/backend/ tools/vocab-tools/

      - name: semgrep
        run: semgrep --config=p/security-audit --config=p/python --error --skip-unknown-extensions --metrics=off apps/backend/ tools/vocab-tools/

      - name: vulture
        run: vulture apps/backend/src tools/vocab-tools/vocab_tools --min-confidence 100 --exclude venv,generated,__pycache__

      - name: pylint duplicate code
        run: pylint --disable=all --enable=duplicate-code --min-similarity-lines=10 --ignore-comments=yes --ignore-docstrings=yes --ignore-imports=yes apps/backend/src/ tools/vocab-tools/vocab_tools/

      - name: pip-audit
        run: pip-audit -r apps/backend/requirements.txt -r tools/vocab-tools/requirements.txt --ignore-vuln GHSA-7gcm-g887-7qv7 --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln GHSA-gfwx-w7gr-fvh7 --ignore-vuln GHSA-jm6w-m3j8-898g

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - name: Copy-paste detection
        run: npx jscpd --min-lines 6 --min-tokens 50 --threshold 3 packages/ apps/

      - name: Dead code detection (knip)
        run: npx knip --no-progress --no-config-hints

      - name: Validate GitHub workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

      - name: Validate OpenAPI schema
        run: pip install openapi-spec-validator && python -m openapi_spec_validator schema/lingua-quiz-schema.json

      - name: shellcheck
        continue-on-error: true
        run: |
          sudo apt-get install -y shellcheck
          find . -name '*.sh' -not -path '*/node_modules/*' -not -path '*/.git/*' | xargs shellcheck --exclude=SC2034,SC2155,SC2086

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3018,DL3013,DL3029,DL3059,DL3003

      - name: yamllint
        run: pip install yamllint && yamllint -d relaxed .

      - name: stylelint
        continue-on-error: true
        run: npx stylelint --config .stylelintrc.json '**/*.{css,scss}'

      - name: SQL lint
        continue-on-error: true
        run: sqlfluff lint --dialect=postgres --exclude-rules=RF04 .

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    strategy:
      fail-fast: true
      matrix:
        service: [backend, frontend, integration-e2e-tests]
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      sha: ${{ steps.tag.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            REF="pr-${{ github.event.pull_request.number }}"
          else
            SHA="${{ github.sha }}"
            REF=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          fi
          echo "value=${REF}-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.service }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/lingua-quiz-${{ matrix.service }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/lingua-quiz-${{ matrix.service }}:${{ steps.tag.outputs.commit_sha }}
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.value }}
            APP_ENVIRONMENT=staging
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ steps.tag.outputs.commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/lingua-quiz-${{ matrix.service }}:${{ steps.tag.outputs.value }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  test:
    runs-on: ubuntu-latest
    needs: [lint, build]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and tag images
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          for svc in backend frontend integration-e2e-tests; do
            docker pull "${{ env.REGISTRY }}/lingua-quiz-${svc}:${TAG}"
          done
          docker tag "${{ env.REGISTRY }}/lingua-quiz-backend:${TAG}" lingua-quiz-backend:latest
          docker tag "${{ env.REGISTRY }}/lingua-quiz-frontend:${TAG}" lingua-quiz-frontend:latest
          docker tag "${{ env.REGISTRY }}/lingua-quiz-integration-e2e-tests:${TAG}" lingua-quiz-tests:latest

      - name: Run tests
        run: |
          mkdir -p test-reports && chmod 777 test-reports
          docker compose --profile test-all up --no-build --abort-on-container-exit --exit-code-from test-all

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: test-reports/
          retention-days: 1

      - name: Cleanup
        if: always()
        run: docker compose --profile test-all down -v

  ci-success:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, deep-analysis, build, test]
    timeout-minutes: 1
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.deep-analysis.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::CI failed: lint=${{ needs.lint.result }}, deep-analysis=${{ needs.deep-analysis.result }}, build=${{ needs.build.result }}, test=${{ needs.test.result }}"
            exit 1
          fi
