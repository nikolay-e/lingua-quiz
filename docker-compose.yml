services:
  db:
    image: postgres:13-alpine
    container_name: lingua-quiz-db-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: linguaquiz_local_db
      POSTGRES_USER: linguaquiz_local_user
      POSTGRES_PASSWORD: your_strong_local_password
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linguaquiz_local_user -d linguaquiz_local_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingua-quiz-local-net

  backend:
    container_name: lingua-quiz-backend-local
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      args:
        NODE_ENV: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: "service_completed_successfully"
    environment:
      NODE_ENV: development
      PORT: 9000
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: linguaquiz_local_db
      POSTGRES_USER: linguaquiz_local_user
      POSTGRES_PASSWORD: your_strong_local_password
      JWT_SECRET: your_very_secret_local_jwt_key_that_is_long
      DOCKER_ENVIRONMENT: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://frontend"
    ports:
      - "9000:9000"
    networks:
      - lingua-quiz-local-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:9000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  frontend:
    container_name: lingua-quiz-frontend-local
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - lingua-quiz-local-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://frontend:80/"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  migrations:
    container_name: lingua-quiz-migrations-local
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      args:
        NODE_ENV: development
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: linguaquiz_local_db
      POSTGRES_USER: linguaquiz_local_user
      POSTGRES_PASSWORD: your_strong_local_password
      JWT_SECRET: your_very_secret_local_jwt_key_that_is_long
    command: npm run migrate --workspace=@linguaquiz/backend
    networks:
      - lingua-quiz-local-net

  e2e-tests:
    container_name: lingua-quiz-e2e-tests
    build:
      context: .
      dockerfile: packages/e2e-tests/Dockerfile
    environment:
      LINGUA_QUIZ_URL: http://frontend:80
      API_URL: http://backend:9000
      NODE_ENV: test
      # Don't buffer output - show logs immediately
      FORCE_COLOR: "1"
      CI: "1"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Running Auth E2E tests only...' &&
        npx playwright test tests/001-auth.spec.js --workers=1
      "
    networks:
      - lingua-quiz-local-net
    volumes:
      - playwright_report:/app/packages/e2e-tests/playwright-report
      - test_results:/app/packages/e2e-tests/test-results

volumes:
  pgdata_local:
  playwright_report:
  test_results:

networks:
  lingua-quiz-local-net:
    driver: bridge
