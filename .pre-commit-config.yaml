minimum_pre_commit_version: '3.5.0'
default_stages: [pre-commit]
default_language_version:
  python: python3.13
  node: system

fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-ast
      - id: check-docstring-first
      - id: name-tests-test
        args: ['--pytest-test-first']
        exclude: ^tests/e2e/(fixtures|pages|utils)/
      - id: check-yaml
        exclude: ^(helm/.*\.yaml|flux/.*/flux-system/.*)$
      - id: check-json
      - id: check-toml
      - id: trailing-whitespace
        exclude: (/generated/|^lingua-quiz-schema\.json$)
      - id: end-of-file-fixer
        exclude: (/generated/|^lingua-quiz-schema\.json$)
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: (/generated/|^lingua-quiz-schema\.json$)
      - id: fix-byte-order-marker

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        name: Lint Python with ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        types_or: [python, pyi]
        files: ^(apps/backend|tools/vocab-tools|tests/e2e)/
      - id: ruff-format
        name: Format Python with ruff
        types_or: [python, pyi]
        files: ^(apps/backend|tools/vocab-tools|tests/e2e)/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format JS/TS with Prettier
        args: ['--write']
        files: \.(js|jsx|ts|tsx|json|css|scss|html|md)$
        exclude: (/generated/|^lingua-quiz-schema\.json$|/(dist|build|node_modules)/|^package-lock\.json$|^flux/.*/flux-system/)

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
        name: Scan for secrets (gitleaks)
        exclude: ^\.secrets\.baseline$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets (baseline-based)
        args: ['--baseline', '.secrets.baseline']
        exclude: (/generated/|^lingua-quiz-schema\.json$|^package-lock\.json$)

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: Spell checking
        args:
          [
            '--write-changes',
            '--ignore-words-list=crate,nd,ser,llm,async,cli,theses,ba,te,tha,ue,refreshin,ist,lief,calle,cliente,flor,inicial,soler,afterall,ture,ure,sie,bein,alle,oder,deine,als,aktion,deines,vor,aktive,caracteres,wasn,couldn,tage',
          ]
        exclude: ^(\.git/|\.venv/|venv/|node_modules/|/generated/|^schema/lingua-quiz-schema\.json$|^package-lock\.json$|tools/vocab-tools/vocab_tools/data/subtitle_frequencies/|tools/vocab-tools/vocab_tools/data/reference/cefr/|tools/vocab-tools/exported_vocabularies/|data/vocabularies/)

  - repo: local
    hooks:
      - id: sort-package-json
        name: Sort package.json files
        entry: npx sort-package-json "package.json" "packages/*/package.json" "apps/*/package.json"
        language: system
        files: ^(package\.json|packages/.*/package\.json|apps/.*/package\.json)$
        pass_filenames: false

      - id: eslint
        name: ESLint
        entry: npm run lint
        language: system
        pass_filenames: false
        always_run: true
        files: \.(js|jsx|ts|tsx)$

      - id: typecheck
        name: TypeScript type checking
        entry: npm run typecheck
        language: system
        pass_filenames: false
        always_run: true
        files: \.(ts|tsx)$

      - id: mypy
        name: mypy
        entry: mypy --python-version=3.13 --check-untyped-defs --ignore-missing-imports --no-warn-unused-ignores apps/backend/src/
        language: system
        pass_filenames: false
        always_run: true
        files: \.py$

      - id: npm-audit
        name: npm audit
        entry: npm audit --audit-level=high --omit=dev
        language: system
        pass_filenames: false
        always_run: true
        files: package-lock\.json$

      - id: pip-audit
        name: pip-audit
        entry: pip-audit -r apps/backend/requirements.txt -r tools/vocab-tools/requirements.txt --ignore-vuln GHSA-7gcm-g887-7qv7 --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln GHSA-gfwx-w7gr-fvh7 --ignore-vuln GHSA-jm6w-m3j8-898g
        language: system
        pass_filenames: false
        always_run: true
        files: requirements.*\.txt$

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        name: Validate commit message
        stages: [commit-msg]
        args: ['--msg-filename']
